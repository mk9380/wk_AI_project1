version: 2

models:
  - name: dim_opportunity_partners
    description: |
      A Slowly Changing Dimension (SCD) Type 2 table containing opportunities and their related partners.
      This includes data from the partner relationship salesforce object and historical partners, which were part of the opportunity object itself.
      The table grain is one record per opportunity per historical version. Use the is_latest flag for current state analysis, or join on version_start_at/version_end_at for historical reporting.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - opportunity_id
            - version_start_at
    config:
      persist_docs:
        relation: true
        columns: true
    columns:
      - name: opportunity_id
        description: "{{ doc('col_opportunity_id') }}"
        data_type: string
        tests:
          - not_null

      - name: partner_1_account_id
        description: Account ID of the first partner.
        data_type: string

      - name: partner_1_relationship
        description: The relationship the first partner has with the opportunity.
        data_type: string

      - name: partner_1_type
        description: The type of the first partner.
        data_type: string

      - name: partner_1_account_name
        description: The account name of the first partner.
        data_type: string
      
      - name: partner_1_account_region
        description: The account region of the first partner.
        data_type: string

      - name: partner_1_ultimate_parent_account_id
        description: The ultimate parent account ID of the first partner's account.
        data_type: string

      - name: partner_1_geographic_tag
        description: The partner geographic tag of the first partner's account.
        data_type: string

      - name: partner_1_status
        description: The status of the first partner
        data_type: string

      - name: partner_1_added_stage
        description: The opportunity stage at which the first partner was added.
        data_type: string
      
      - name: partner_2_account_id
        description: "Account ID of the second partner."
