version: 2

models:
  - name: obt_bookings
    description: |
      A OBT (One Big Table) consolidating bookings data with related dimensions for comprehensive analysis,
      providing a complete view of opportunity and customer context at the time of booking or closure.
    config:
      persist_docs:
        relation: true
        columns: true
    columns:
      - name: booking_key
        description: "The unique key from the fct_bookings table, identifying a specific booking record. This ID represents the primary key."
        data_type: string
        tests:
          - unique
          - not_null

      - name: currency_iso_code
        description: "The currency ISO code (e.g., 'USD', 'EUR') associated with the booking."
        data_type: string

      - name: first_year_s_s_net_amt_usd
        description: "The First Year Subscription & Support (S&S) Net Amount, converted to USD, for the closed-won booking."
        data_type: decimal
          
      - name: customer_account_id
        description: "The ID of the customer account tied to the booking."
        data_type: string

      - name: account_name
        description: "The name of the account."
        data_type: string

      - name: account_region
        description: "The geographic region of the account."
        data_type: string

      - name: account_segment
        description: "The business segment of the account."
        data_type: string

      - name: account_corporate_country
        description: "The primary country of the account's corporation."
        data_type: string

      - name: account_corporate_country_region
        description: "Region derived from account corporate country using the standard country-to-region mapping (APAC, EMEA, LATAM, North America). Returns 'Other' when the country is not in the mapping."
        data_type: string
      
      - name: account_sales_territory
        description: "The sales territory associated with the account."
        data_type: string

      - name: account_type
        description: "The type of account (e.g., Customer, Prospect)."
        data_type: string

      - name: account_workiva_internal_industry
        description: "The internal Workiva industry classification."
        data_type: string

      - name: account_inside_sales_owner_name
        description: "Name of the inside sales owner."
        data_type: string

      - name: account_sec_owner_name
        description: "Name of the security owner."
        data_type: string

      - name: account_capital_markets_owner_name
        description: "Name of the capital markets owner."
        data_type: string

      - name: account_integrated_risk_owner_name
        description: "Name of the integrated risk owner."
        data_type: string

      - name: account_renewal_owner_name
        description: "Name of the renewal owner."
        data_type: string

      - name: account_owner_name
        description: "Name of the primary account owner."
        data_type: string

      - name: account_partner_owner_name
        description: "Name of the partner account owner."
        data_type: string

      - name: account_global_stat_owner_name
        description: "Name of the global statistics owner."
        data_type: string

      - name: account_financial_services_owner_name
        description: "Name of the financial services owner."
        data_type: string

      - name: account_esg_mgmt_reporting_owner_name
        description: "Name of the ESG management reporting owner."
        data_type: string

      - name: is_financial_industry
        description: "Boolean flag indicating if the account is in the financial industry."
        data_type: boolean

      - name: is_energy_industry
        description: "Boolean flag indicating if the account is in the energy industry."
        data_type: boolean

      - name: financial_industry_type
        description: "A derived field classifying the type of financial industry."
        data_type: string

      - name: energy_industry_type
        description: "A derived field classifying the type of energy industry."
        data_type: string

      - name: is_on_the_path
        description: "A custom flag (e.g., related to a specific sales/onboarding path)."
        data_type: boolean
      
      - name: account_annual_revenue
        description: "The annual revenue of the account."
        data_type: numeric
      
      - name: account_annual_revenue_usd
        description: "The annual revenue of the account in USD."
        data_type: numeric
      
      - name: account_annual_revenue_band
        description: "The categorical banding of an account based on its annual revenue in USD."
        data_type: string
      
      - name: parent_account_id
        description: "The ID of the parent account."
        data_type: string
      
      - name: ultimate_parent_account_id
        description: "The ID of the ultimate parent account."
        data_type: string

      - name: ultimate_parent_account_id_18_digit
        description: "The 18-digit ID of the top-level ultimate parent account."
        data_type: string

      - name: ultimate_parent_account_name
        description: "The name of the ultimate parent account."
        data_type: string

      - name: ultimate_parent_annual_revenue
        description: "The annual revenue of the ultimate parent account."
        data_type: numeric 

      - name: ultimate_parent_account_type
        description: "The account type of the ultimate parent."
        data_type: string

      - name: ultimate_parent_corporate_country
        description: "The corporate country of the ultimate parent."
        data_type: string

      - name: ultimate_parent_region
        description: "The region of the ultimate parent."
        data_type: string

      - name: ultimate_parent_csrd
        description: "The CSRD classification of the ultimate parent."
        data_type: string

      - name: ultimate_parent_segment
        description: "The business segment of the ultimate parent."
        data_type: string

      - name: ultimate_parent_account_owner_role
        description: "The account owner role of the ultimate parent."
        data_type: string

      - name: ultimate_parent_wk_company_type
        description: "The Workiva company type of the ultimate parent."
        data_type: string

      - name: ultimate_parent_customer_flag
        description: "Flag indicating if the ultimate parent account is a customer."
        data_type: boolean

      - name: ultimate_parent_industry_group
        description: "The industry group of the ultimate parent."
        data_type: string
  
      - name: is_closed_won
        description: "A boolean flag indicating if the opportunity is in a closed won stage."
        data_type: boolean

      - name: is_closed_pending
        description: "A boolean flag indicating if the opportunity is in a closed pending stage."
        data_type: boolean

      - name: is_closed_lost
        description: "A boolean flag indicating if the opportunity is in a closed lost stage."
        data_type: boolean

      - name: has_new_solution_category
        description: "Custom macro-derived flag for new solution category purchase."
        data_type: boolean

      - name: win_rate
        description: "Custom macro-derived classification for win rate (e.g., 'Wins', 'Losses') based on opportunity roles and type."
        data_type: string

      - name: average_deal_size_flag
        description: "Boolean flag: TRUE if `win_rate = 'Wins'` and `first_year_s_s_net_amt_usd > 0`. Used for deal size calculations."
        data_type: boolean

      - name: cycle_time
        description: "The time (in days) between the Opportunity Qualified Date and the Booking or Closed Date for winning opportunities."
        data_type: integer 

      - name: is_event_reg_and_gen_ai
        description: "Boolean flag: TRUE if 'solution_category' is 'Event Registration' or 'Generative AI'."
        data_type: boolean

      - name: delivery_partner
        description: "The external partner delivering the services related to the booking."
        data_type: string

      - name: delivery_type
        description: "The type of delivery for the solution (e.g., 'DIY/None', 'Partner', 'Workiva')."
        data_type: string

      - name: is_diy_delivery
        description: "Boolean flag: TRUE if the delivery_type is 'DIY/None'."
        data_type: boolean

      - name: large_deal_category
        data_type: string
        description: |
          Categorizes the opportunity based on its total consolidated first_year_s_s_net_amt_usd. 
          This is calculated at the opportunity level, representing the aggregate value of the deal 
          rather than individual solution totals.
     
      - name: solution_total_id
        description: "Unique identifier for the Solution Total record."
        data_type: string

      - name: opportunity_solution_classification_key
        description: "{{ doc('col_opportunity_solution_classification_key') }}"
        data_type: string

      - name: solution_total_name
        description: "{{ doc('col_solution_total_name') }}"
        data_type: string

      - name: solution_category
        description: "{{ doc('col_solution_category') }}"
        data_type: string

      - name: booking_category
        description: "{{ doc('col_booking_category') }}"
        data_type: string
      
      - name: budgeted_booking_category
        description: "{{ doc('col_budgeted_booking_category') }}"
        data_type: string

      - name: solution_group
        description: "{{ doc('col_solution_group') }}"
        data_type: string

      - name: sku_grouping
        description: "{{ doc('col_sku_grouping') }}"
        data_type: string

      - name: solution_picklist
        description: "{{ doc('col_solution_picklist') }}"
        data_type: string

      - name: reporting_classification
        description: "The classification used for bookings reporting."
        data_type: string

      - name: persona
        description: "{{ doc('col_persona') }}"
        data_type: string

      - name: is_multi_category
        data_type: boolean
        description: "{{ doc('col_is_multi_category') }}"

      - name: is_multi_solution_category
        data_type: boolean
        description: "{{ doc('col_is_multi_solution_category') }}"
      
      - name: is_multi_booking_category
        data_type: boolean
        description: "{{ doc('col_is_multi_booking_category') }}"
      
      - name: is_multi_sku_grouping
        data_type: boolean
        description: "{{ doc('col_is_multi_sku_grouping') }}"

      - name: is_multi_solution
        data_type: boolean
        description: "{{ doc('col_is_multi_solution') }}"

      - name: is_advanced_sku_grouping
        data_type: boolean
        description: "{{ doc('col_is_advanced_sku_grouping') }}"

      - name: is_standard_sku_grouping
        data_type: boolean
        description: "{{ doc('col_is_standard_sku_grouping') }}"

      - name: opportunity_has_advanced_sku_grouping
        data_type: boolean
        description: "{{ doc('col_opportunity_has_advanced_sku_grouping') }}"

      - name: opportunity_has_standard_sku_grouping
        data_type: boolean
        description: "{{ doc('col_opportunity_has_standard_sku_grouping') }}"

      - name: opportunity_created_at
        description: "{{ doc('col_opportunity_created_at') }}"
        data_type: timestamp

      - name: opportunity_created_date
        description: "{{ doc('col_opportunity_created_date') }}"
        data_type: date

      - name: opportunity_created_quarter_date
        description: "{{ doc('col_opportunity_created_quarter_date') }}"
        data_type: date

      - name: opportunity_created_year_quarter
        description: "{{ doc('col_opportunity_created_year_quarter') }}"
        data_type: string

      - name: opportunity_closed_date
