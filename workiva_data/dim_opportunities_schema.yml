version: 2

models:
  - name: dim_opportunities
    description: |
      A Type 2 Slowly Changing Dimension (SCD) model representing the historical state of Salesforce Opportunities.
      The table grain is one record per opportunity per historical version. Use the is_latest flag for current state analysis, or join on version_start_at/version_end_at for historical reporting.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - opportunity_id
            - version_start_at
    config:
      persist_docs:
        relation: true
        columns: true
    columns:
      - name: opportunity_id
        description: "{{ doc('col_opportunity_id') }}"
        data_type: string
        tests:
          - not_null

      - name: opportunity_name
        description: "{{ doc('col_opportunity_name') }}"
        data_type: string

      - name: opportunity_stage_name
        description: "{{ doc('col_opportunity_stage_name') }}"
        data_type: string

      - name: opportunity_deal_type
        description: "{{ doc('col_opportunity_deal_type') }}"
        data_type: string

      - name: opportunity_type
        description: "{{ doc('col_opportunity_type') }}"
        data_type: string

      - name: opportunity_reporting_sub_type
        description: "{{ doc('col_opportunity_reporting_sub_type') }}"
        data_type: string

      - name: opportunity_currency_iso_code
        description: "{{ doc('col_opportunity_currency_iso_code') }}"
        data_type: string

      - name: opportunity_owner_role
        description: "{{ doc('col_opportunity_owner_role') }}"
        data_type: string

      - name: opportunity_closing_role
        description: "{{ doc('col_opportunity_closing_role') }}"
        data_type: string

      - name: opportunity_lead_source
        description: "{{ doc('col_opportunity_lead_source') }}"
        data_type: string

      - name: opportunity_first_associated_contact_lead_source
        description: "{{ doc('col_opportunity_first_associated_contact_lead_source') }}"
        data_type: string

      - name: opportunity_origin_source
        description: "{{ doc('col_opportunity_origin_source') }}"
        data_type: string

      - name: opportunity_forecast_category_name
        description: "{{ doc('col_opportunity_forecast_category_name') }}"
        data_type: string

      - name: solution_category
        description: "{{ doc('col_solution_category') }}"
        data_type: string

      - name: opportunity_sales_ops_review_status
        description: "{{ doc('col_opportunity_sales_ops_review_status') }}"
        data_type: string

      - name: opportunity_legal_review_status
        description: "{{ doc('col_opportunity_legal_review_status') }}"
        data_type: string

      - name: opportunity_accounting_review_status
        description: "{{ doc('col_opportunity_accounting_review_status') }}"
        data_type: string

      - name: opportunity_partnership_notes
        description: "{{ doc('col_opportunity_partnership_notes') }}"
        data_type: string

      - name: opportunity_service_delivery_notes
        description: "{{ doc('col_opportunity_service_delivery_notes') }}"
        data_type: string

      - name: opportunity_competitor
        description: "{{ doc('col_opportunity_competitor') }}"
        data_type: string

      - name: opportunity_value_management_engagement
        description: "{{ doc('col_opportunity_value_management_engagement') }}"
        data_type: string

      - name: opportunity_closed_reason
        description: "{{ doc('col_opportunity_closed_reason') }}"
        data_type: string

      - name: opportunity_closed_notes
        description: "{{ doc('col_opportunity_closed_notes') }}"
        data_type: string

      - name: opportunity_created_at
        description: "{{ doc('col_opportunity_created_at') }}"
        data_type: timestamp
      
      - name: opportunity_created_date
        description: "{{ doc('col_opportunity_created_date') }}"
        data_type: date
      
      - name: opportunity_created_quarter_date
